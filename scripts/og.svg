<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a40"/>
      <stop offset="0.5" stop-color="#4b1d8f"/>
      <stop offset="1" stop-color="#b5179e"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- scattered confetti glyphs -->
  <g font-family="Arial, sans-serif" font-weight="900" opacity="0.9">
    <text x="120" y="170" font-size="120" fill="#ff595e" transform="rotate(-12 120 170)">A</text>
    <text x="980" y="150" font-size="110" fill="#ffca3a" transform="rotate(10 980 150)">Z</text>
    <text x="150" y="520" font-size="100" fill="#8ac926" transform="rotate(8 150 520)">★</text>
    <text x="1010" y="540" font-size="120" fill="#00d2d3" transform="rotate(-10 1010 540)">7</text>
    <text x="1080" y="330" font-size="90" fill="#ff66c4" transform="rotate(14 1080 330)">G</text>
    <text x="60" y="350" font-size="90" fill="#54a0ff" transform="rotate(-8 60 350)">★</text>
  </g>
  <g opacity="0.5" filter="url(#soft)">
    <circle cx="300" cy="120" r="16" fill="#ffca3a"/>
    <circle cx="900" cy="470" r="20" fill="#ff595e"/>
    <circle cx="760" cy="120" r="14" fill="#8ac926"/>
    <circle cx="420" cy="520" r="18" fill="#54a0ff"/>
  </g>

  <!-- title -->
  <g text-anchor="middle" font-family="Arial, sans-serif" font-weight="900">
    <text x="600" y="300" font-size="150" letter-spacing="-4">
      <tspan fill="#ffd166">baby</tspan><tspan fill="#ff5d8f">mash</tspan>
    </text>
    <text x="600" y="385" font-size="44" font-weight="700" fill="#ffffff" opacity="0.95">
      Let them smash. Keep your desktop safe.
    </text>
    <text x="600" y="470" font-size="30" font-weight="700" fill="#ffffff" opacity="0.7">
      Blocks shortcuts &amp; gestures · animations · sounds · score
    </text>
  </g>

  <!-- pill -->
  <g>
    <rect x="470" y="510" width="260" height="62" rx="31" fill="#ffca3a"/>
    <text x="600" y="551" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="30" fill="#1a1a40">babymash.app</text>
  </g>
</svg>
