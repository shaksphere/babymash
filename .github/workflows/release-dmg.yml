name: Build macOS DMG

# Builds the Electron desktop app and attaches the .dmg(s) to a GitHub Release.
# Trigger by pushing a tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# Or run manually from the Actions tab (workflow_dispatch) to just build artifacts.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_dmg:
    runs-on: macos-latest
    env:
      # The `secrets` context can't be used in `if:` conditions, so mirror the
      # one we branch on into env (booleans become the strings 'true'/'false').
      HAS_APPLE_KEY: ${{ secrets.APPLE_API_KEY_P8_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build web assets
        run: npm run build

      # Write the App Store Connect API key (.p8) to a file for notarytool.
      # Only runs when the secret exists; otherwise the build stays unsigned.
      - name: Prepare notarization API key
        if: env.HAS_APPLE_KEY == 'true'
        env:
          # Pass via env (not inline ${{ }}) so the value is never expanded into
          # the shell command line. GitHub masks secrets in logs regardless.
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/api_key.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/api_key.p8" >> "$GITHUB_ENV"

      - name: Build DMG (signed + notarized when secrets are present)
        # --publish never: we attach the DMG ourselves below, so electron-builder
        # must not try to publish to GitHub (which would need a token).
        run: npx electron-builder --publish never
        env:
          # Code signing — electron-builder imports the .p12 from CSC_LINK (base64).
          # When CSC_LINK is empty, auto-discovery is disabled => unsigned build.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
          # Notarization (App Store Connect API key). APPLE_API_KEY path is set above.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload DMG as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: babymash-macos-dmg
          path: release/*.dmg

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          generate_release_notes: true
